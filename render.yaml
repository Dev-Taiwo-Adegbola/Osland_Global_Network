services:
  - type: web
    name: osland-global-network
    env: python
    buildCommand: "./render_build.sh"
    startCommand: "gunicorn osland.wsgi:application"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "osland-global-network.onrender.com"
      - key: PERSISTENT_DATA_PATH
        value: "/osland_data"
    disk:
      name: osland-persist-v2
      mountPath: /osland_data
      sizeGB: 1
