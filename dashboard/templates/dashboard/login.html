{% load static tailwind_tags %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Osland Admin</title>
    {% tailwind_css %}
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-950 flex items-center justify-center min-h-screen p-4">
    <div class="max-w-md w-full bg-slate-900/40 rounded-3xl p-10 border border-slate-800 shadow-2xl">
        <div class="text-center mb-10">
            <h2 class="text-3xl font-black text-white mb-2">OSLAND <span class="text-blue-600">ADMIN</span></h2>
            <p class="text-slate-400 font-medium">Please sign in to your dashboard</p>
        </div>

        {% if form.errors %}
        <div class="mb-6 p-4 bg-red-500/10 border border-red-500/20 rounded-2xl text-red-400 text-sm font-medium">
            Your username and password didn't match. Please try again.
        </div>
        {% endif %}

        <form method="post" class="space-y-6">
            {% csrf_token %}
            <div>
                <label for="id_username" class="block text-sm font-bold text-slate-400 mb-2 px-1 uppercase tracking-widest">Username</label>
                <input type="text" name="username" id="id_username" required 
                    class="w-full px-6 py-4 bg-slate-800 border-none rounded-2xl text-white placeholder-slate-500 focus:ring-2 focus:ring-blue-600 transition"
                    placeholder="Enter your username">
            </div>
            <div>
                <label for="id_password" class="block text-sm font-bold text-slate-400 mb-2 px-1 uppercase tracking-widest">Password</label>
                <input type="password" name="password" id="id_password" required 
                    class="w-full px-6 py-4 bg-slate-800 border-none rounded-2xl text-white placeholder-slate-500 focus:ring-2 focus:ring-blue-600 transition"
                    placeholder="••••••••">
            </div>
            <button type="submit" class="w-full py-4 bg-blue-600 text-white rounded-2xl font-black text-lg hover:bg-blue-700 transition shadow-xl shadow-blue-600/20">
                Sign In
            </button>
        </form>

        <div class="mt-10 pt-8 border-t border-slate-800 text-center">
            <a href="{% url 'core:home' %}" class="text-slate-500 hover:text-white transition text-sm font-bold flex items-center justify-center space-x-2">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
                <span>Back to Website</span>
            </a>
        </div>
    </div>
</body>
</html>
