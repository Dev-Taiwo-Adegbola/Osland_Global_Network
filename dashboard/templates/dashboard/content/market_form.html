{% extends 'dashboard/base_dashboard.html' %}

{% block header_title %}Add Export Market{% endblock %}
{% block breadcrumb %}Market / Add{% endblock %}

{% block content %}
<div class="max-w-2xl">
    <div class="bg-white rounded-3xl border border-gray-100 shadow-sm p-10">
        <form method="post" class="space-y-8">
            {% csrf_token %}
            
            <div class="space-y-6">
                <div>
                    <label class="block text-sm font-bold text-gray-400 mb-2 uppercase tracking-widest px-1">Country Name</label>
                    {{ form.country_name }}
                </div>
            </div>

            <div class="pt-8 border-t border-gray-100 flex items-center justify-between">
                <a href="{% url 'dashboard:market_list' %}" class="text-gray-500 font-bold hover:text-gray-900 transition underline">Cancel</a>
                <button type="submit" class="bg-blue-600 text-white px-10 py-4 rounded-full font-black text-lg hover:bg-blue-700 transition shadow-xl shadow-blue-500/20">
                    Save Market
                </button>
            </div>
        </form>
    </div>
</div>

<script>
    document.querySelectorAll('input[type="text"]').forEach(el => {
        el.className += ' w-full px-6 py-4 bg-gray-50 border-none rounded-2xl focus:ring-2 focus:ring-blue-600 transition font-bold text-gray-900';
    });
</script>
{% endblock %}
